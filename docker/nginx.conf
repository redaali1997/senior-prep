server {
    listen 80;
    index index.php;
    root /var/www/public;          # نقطة دخول Laravel

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;     # ← اسم خدمة php-fpm! (Module 4)
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}