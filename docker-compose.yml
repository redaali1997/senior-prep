services:
  database:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  app:
    build:
      context: .
      target: production
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=database
      - DB_DATABASE=laravel
      - DB_USERNAME=laravel
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=cache
      - QUEUE_CONNECTION=redis
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
    restart: unless-stopped

  queue:
    build:
      context: .
      target: production
    command: php artisan queue:work --tries=3 --timeout=90
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=database
      - DB_DATABASE=laravel
      - DB_USERNAME=laravel
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=cache
      - QUEUE_CONNECTION=redis
    depends_on:
      - database
      - cache
    restart: unless-stopped
    # stop_grace_period: 60s

  schedule:
    build:
      context: .
      target: production
    command: php artisan schedule:work
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=database
      - DB_PORT=3306
      - DB_DATABASE=laravel
      - DB_USERNAME=laravel
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=cache
      - QUEUE_CONNECTION=redis
    depends_on:
      - database
      - cache
    restart: unless-stopped
    
  cache:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s

  nginx:
    build:
      context: .
      target: nginx
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  db-data: