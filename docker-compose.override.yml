services:
  database:
    ports:
      - "3307:3306"

  app:
    build:
      context: .
      target: builder
    volumes:
      - .:/var/www
      - /var/www/vendor
      - /var/www/node_modules
    environment:
      - APP_DEBUG=true
      - APP_ENV=local

  queue:
    volumes:
      - .:/var/www
      - /var/www/vendor
      - /var/www/node_modules

  schedule:
    volumes:
      - .:/var/www
      - /var/www/vendor
      - /var/www/node_modules
    
  cache:
    ports:
      - "6379:6379"

  nginx:
    ports:
      - "8000:80"
    volumes:
      - ./public:/var/www/public
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf