name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  greet:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Show the runner environment
        run: |
          echo "PHP version on this clean runner:"
          php --version
          echo "Current directory:"
          pwd
          ls -la