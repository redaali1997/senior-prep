name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  greet:
    runs-on: ubuntu-latest
    
    steps:
      - name: Say Hello
        run: echo "أول pipeline شغّال على الريبو 🎉"

      - name: Show the runner environment
        run: |
          echo "PHP version on this clean runner:"
          php --version
          echo "Current directory:"
          pwd
          ls -la